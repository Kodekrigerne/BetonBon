# Docker compose used for production setup

name: betonbon-prod

services:

# Proxy manager (gatekeeper)
  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - '80:80'      # Incoming HTTP
      - '443:443'    # Incoming HTTPS
      - '81:81'      # Controlpanel
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt


# PostgreSQL database
  db:
    image: postgres:18-alpine
    container_name: beton-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql


# Backend API
  api:
    labels:
      - "com.centurylinklabs.watchtower.scope=prod"
    image: ghcr.io/kodekrigerne/betonbon-api:latest
    container_name: beton-api
    restart: always
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - ASPNETCORE_ENVIRONMENT=Production
      - ClientUrl=${CLIENT_URL}
      - API_SECRET=${API_SECRET}
      - API_GRANT=${GRANT}
    depends_on:
      - db


# Frontend project
  client:
    labels:
      - "com.centurylinklabs.watchtower.scope=prod"
    image: ghcr.io/kodekrigerne/betonbon-client:latest
    container_name: beton-client
    restart: always
    depends_on:
      - api


# Fetches new images from GitHub Container Registry
# and replaces running containers with them.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_SCOPE=prod
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    command: --interval 60 --cleanup

volumes:
  pgdata:
  npm_data:
  npm_letsencrypt: